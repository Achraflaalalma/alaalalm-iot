apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: playground
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://git@github.com:Achraflaalalma/alaalalm-iot.git
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true